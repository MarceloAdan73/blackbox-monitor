interval: 60

# ===== ALERTAS POR TELEGRAM (OPCIONAL) =====
# Para activar, crea un bot con @BotFather en Telegram
# y completa los campos abajo con tu token y chat_id.
# Mas info en README.md
telegram:
  enabled: false
  bot_token: "YOUR_BOT_TOKEN_HERE"
  chat_id: "YOUR_CHAT_ID_HERE"

sites:
  - name: "Example Site"
    url: "https://example.com"
    timeout: 5000
  - name: "HTTPBin"
    url: "https://httpbin.org/get"
    timeout: 5000
  - name: "Wikipedia"
    url: "https://www.wikipedia.org"
    timeout: 5000
  - name: "GitHub"
    url: "https://github.com"
    timeout: 5000
